<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Golden Pi Master - Pro Version</title>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <style>
        :root { --accent: #ff0000; --gold: #ffcc00; }
        body { 
            background: #000; color: #fff; margin: 0; padding: 0; 
            font-family: Arial, sans-serif; overflow: hidden;
            height: 100vh; display: flex; flex-direction: column;
        }
        #game-container { 
            position: relative; flex-grow: 1; width: 100%; 
            background: radial-gradient(circle, #220000, #000);
            overflow: hidden; touch-action: none;
        }
        .block { 
            position: absolute; width: 60px; height: 60px; 
            background: var(--accent); border: 2px solid var(--gold);
            border-radius: 8px; box-shadow: 0 0 15px var(--accent);
            display: flex; align-items: center; justify-content: center;
            font-weight: bold; font-size: 24px; color: var(--gold);
        }
        #ui-layer { 
            padding: 15px; display: flex; justify-content: space-between;
            background: rgba(0,0,0,0.8); border-bottom: 2px solid var(--accent);
        }
        #user-info { font-size: 14px; color: var(--gold); }
        #score-board { font-size: 20px; font-weight: bold; }
        
        /* شاشة البداية */
        #overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); display: flex; flex-direction: column;
            align-items: center; justify-content: center; z-index: 100;
        }
        .btn {
            padding: 15px 40px; font-size: 20px; background: var(--accent);
            color: #fff; border: none; border-radius: 30px; cursor: pointer;
            box-shadow: 0 5px 15px rgba(255,0,0,0.4);
        }
    </style>
</head>
<body>

<div id="ui-layer">
    <div id="user-info">جاري الاتصال بـ Pi...</div>
    <div id="score-board">SCORE: <span id="score">0</span></div>
</div>

<div id="game-container"></div>

<div id="overlay">
    <h1 style="color:var(--gold)">GOLDEN PI MASTER</h1>
    <p id="status-text">سجل دخولك بـ Pi للبدء</p>
    <button class="btn" id="start-btn" onclick="startGame()" style="display:none">إبدأ اللعب</button>
</div>

<script>
    const container = document.getElementById('game-container');
    const scoreElement = document.getElementById('score');
    const userInfo = document.getElementById('user-info');
    const startBtn = document.getElementById('start-btn');
    const statusText = document.getElementById('status-text');

    let score = 0;
    let gameSpeed = 3000; // السرعة الابتدائية (3 ثواني)
    let gameActive = false;

    // --- Pi Network SDK ---
    const Pi = window.Pi;
    Pi.init({ version: "2.0", sandbox: false });

    async function authPi() {
        try {
            const scopes = ['username'];
            const auth = await Pi.authenticate(scopes, () => {});
            userInfo.innerText = `المطور: ${auth.user.username}`;
            statusText.innerText = `مرحباً بك ${auth.user.username}!`;
            startBtn.style.display = "block";
        } catch (err) {
            userInfo.innerText = "لعب كضيف";
            startBtn.style.display = "block";
            statusText.innerText = "جرب اللعبة الآن";
        }
    }

    // --- ميكانيكا اللعبة ---
    function createBlock() {
        if (!gameActive) return;
        
        const block = document.createElement('div');
        block.className = 'block';
        block.innerText = 'π';
        
        // عشوائية الموقع الأفقي مع ضمان بقاء المربع داخل الشاشة
        const maxX = container.clientWidth - 70;
        block.style.left = Math.random() * maxX + 'px';
        block.style.top = '-70px';
        
        container.appendChild(block);

        // تحريك المربع
        let pos = -70;
        const fall = setInterval(() => {
            if (!gameActive) { clearInterval(fall); block.remove(); return; }
            
            pos += 2 + (score / 10); // زيادة السرعة مع السكور
            block.style.top = pos + 'px';

            // إذا فات المربع لتحت (خسارة)
            if (pos > container.clientHeight) {
                gameOver();
                clearInterval(fall);
            }
        }, 10);

        block.onclick = () => {
            score += 1;
            scoreElement.innerText = score;
            block.remove();
            clearInterval(fall);
            
            // تسريع إنتاج المربعات كل ما زاد السكور
            if (score % 5 === 0 && gameSpeed > 800) {
                gameSpeed -= 100;
            }
        };

        // إنتاج المربع القادم
        setTimeout(createBlock, gameSpeed);
    }

    function startGame() {
        gameActive = true;
        score = 0;
        gameSpeed = 2000;
        scoreElement.innerText = "0";
        document.getElementById('overlay').style.display = 'none';
        createBlock();
    }

    function gameOver() {
        gameActive = false;
        container.innerHTML = '';
        document.getElementById('overlay').style.display = 'flex';
        statusText.innerText = `Game Over! Score: ${score}`;
        startBtn.innerText = "حاول مرة أخرى";
    }

    // ابدأ عملية تسجيل الدخول
    authPi();
</script>

</body>
</html>
